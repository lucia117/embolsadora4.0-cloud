openapi: "3.0.3"
info:
  title: Notification Service API
  version: "1.0.0"
  description: |
    API de consulta y gestión de estado de notificaciones para la plataforma embolsadora.
    Cubre los 5 contratos Pact del `notification-service-api` (el 6° — GET /alarm-rules — está implementado en 008).

servers:
  - url: http://localhost:8080/api/v1
    description: Servidor local de desarrollo

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Notification:
      type: object
      required:
        - id
        - tenant_id
        - title
        - message
        - severity
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        tenant_id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        title:
          type: string
          example: "Temperatura crítica detectada"
        message:
          type: string
          example: "La métrica 'temperature' superó el umbral de 80°C en la máquina M-001"
        severity:
          type: string
          enum: [info, warning, critical, error]
          example: "critical"
        status:
          type: string
          enum: [unread, acknowledged, closed]
          example: "unread"
        alarm_rule_id:
          type: string
          format: uuid
          nullable: true
          example: "c3d4e5f6-a7b8-9012-cdef-123456789012"
        machine_id:
          type: string
          format: uuid
          nullable: true
          example: "d4e5f6a7-b8c9-0123-defa-234567890123"
        created_at:
          type: string
          format: date-time
          example: "2026-04-10T14:30:00Z"
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
          example: null
        closed_at:
          type: string
          format: date-time
          nullable: true
          example: null

    NotificationListResponse:
      type: object
      required:
        - data
        - total
        - limit
        - offset
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
          example: 42
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    NotificationCountResponse:
      type: object
      required:
        - unread
      properties:
        unread:
          type: integer
          example: 5

    ErrorResponse:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          example: "notificación no encontrada"
        code:
          type: string
          example: "NOT_FOUND"

    AuthErrorResponse:
      type: object
      description: Formato de error retornado por el middleware JWTAuth en respuestas 401
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "No autorizado"

paths:
  /notifications:
    get:
      summary: Listar notificaciones del tenant
      description: |
        Retorna la lista paginada de notificaciones del tenant autenticado,
        ordenadas por fecha descendente. Soporta filtrado por status y severity.
      operationId: listNotifications
      tags: [Notifications]
      parameters:
        - name: status
          in: query
          description: Filtrar por estado de la notificación
          required: false
          schema:
            type: string
            enum: [unread, acknowledged, closed]
        - name: severity
          in: query
          description: Filtrar por severidad
          required: false
          schema:
            type: string
            enum: [info, warning, critical, error]
        - name: limit
          in: query
          description: Máximo de registros a retornar (default 20, máximo 100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Desplazamiento para paginación (default 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Lista de notificaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
              examples:
                con_datos:
                  summary: Tenant con notificaciones
                  value:
                    data:
                      - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        tenant_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        title: "Temperatura crítica detectada"
                        message: "La métrica 'temperature' superó el umbral de 80°C"
                        severity: "critical"
                        status: "unread"
                        alarm_rule_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                        machine_id: "d4e5f6a7-b8c9-0123-defa-234567890123"
                        created_at: "2026-04-10T14:30:00Z"
                        acknowledged_at: null
                        closed_at: null
                    total: 1
                    limit: 20
                    offset: 0
                vacia:
                  summary: Tenant sin notificaciones
                  value:
                    data: []
                    total: 0
                    limit: 20
                    offset: 0
        "401":
          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
              example:
                success: false
                error: "No autorizado"

  /notifications/count:
    get:
      summary: Contar notificaciones no leídas
      description: Retorna el número de notificaciones con estado `unread` del tenant autenticado.
      operationId: countUnreadNotifications
      tags: [Notifications]
      responses:
        "200":
          description: Conteo de no leídas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCountResponse'
              example:
                unread: 5
        "401":
          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /notifications/{id}:
    get:
      summary: Obtener detalle de una notificación
      description: |
        Retorna el detalle completo de una notificación por ID.
        Solo retorna notificaciones del tenant del solicitante.
      operationId: getNotification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Detalle de la notificación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        "401":
          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        "404":
          description: Notificación no encontrada o pertenece a otro tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "notificación no encontrada"
                code: "NOT_FOUND"

  /notifications/{id}/ack:
    post:
      summary: Acusar recibo de una notificación
      description: |
        Marca una notificación como `acknowledged`. Operación idempotente:
        aplicarla sobre una notificación ya acknowledged o closed retorna éxito sin modificar datos.
      operationId: acknowledgeNotification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notificación actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                tenant_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                title: "Temperatura crítica detectada"
                message: "La métrica 'temperature' superó el umbral de 80°C"
                severity: "critical"
                status: "acknowledged"
                alarm_rule_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                machine_id: "d4e5f6a7-b8c9-0123-defa-234567890123"
                created_at: "2026-04-10T14:30:00Z"
                acknowledged_at: "2026-04-10T15:00:00Z"
                closed_at: null
        "401":
          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        "404":
          description: Notificación no encontrada o pertenece a otro tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/close:
    post:
      summary: Cerrar una notificación
      description: |
        Marca una notificación como `closed`. Operación idempotente:
        aplicarla sobre una notificación ya closed retorna éxito sin modificar datos.
        Puede aplicarse desde cualquier estado (unread o acknowledged).
      operationId: closeNotification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notificación cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                tenant_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                title: "Temperatura crítica detectada"
                message: "La métrica 'temperature' superó el umbral de 80°C"
                severity: "critical"
                status: "closed"
                alarm_rule_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                machine_id: "d4e5f6a7-b8c9-0123-defa-234567890123"
                created_at: "2026-04-10T14:30:00Z"
                acknowledged_at: "2026-04-10T15:00:00Z"
                closed_at: "2026-04-10T16:00:00Z"
        "401":
          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        "404":
          description: Notificación no encontrada o pertenece a otro tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
