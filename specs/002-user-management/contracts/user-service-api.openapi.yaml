openapi: 3.0.3
info:
  title: User Management API
  description: CRUD operations for users within a multi-tenant platform
  version: 1.0.0
  contact:
    name: Embolsadora API Team
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.embolsadora.example.com
    description: Production

paths:
  /api/v1/users:
    get:
      summary: List users for a tenant
      description: Retrieve a paginated list of all users belonging to the authenticated tenant
      operationId: listUsers
      tags:
        - Users
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Tenant identifier for data isolation
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of users per page
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of users to skip (for pagination)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successful response with paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: Total count of users in tenant
                      count:
                        type: integer
                        description: Count of returned users in this page
                      limit:
                        type: integer
                      offset:
                        type: integer
        '400':
          description: Missing or invalid X-Tenant-ID header or pagination params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication failed (missing or invalid JWT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied (user does not belong to specified tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new user
      description: Create a new user within the authenticated tenant
      operationId: createUser
      tags:
        - Users
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Tenant identifier for data isolation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request (missing required fields, invalid email format, invalid pagination)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied (only admin users can create)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict (email already exists in tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/users/{userId}:
    get:
      summary: Get a specific user by ID
      description: Retrieve the full profile of a single user identified by their ID
      operationId: getUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User identifier
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Tenant identifier for data isolation
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied (user does not belong to specified tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found or soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update an existing user
      description: Partially update a user profile (name, role only; email and tenantId are immutable)
      operationId: updateUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User identifier
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Tenant identifier for data isolation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request (invalid role, attempting to modify immutable fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied (only admin users can update)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found or soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a user (soft delete)
      description: Soft-delete a user by setting deleted_at timestamp; user is excluded from future queries
      operationId: deleteUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User identifier
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Tenant identifier for data isolation
      security:
        - BearerAuth: []
      responses:
        '204':
          description: User soft-deleted successfully (no content returned)
        '400':
          description: Invalid user ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied (only admin users can delete)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    User:
      type: object
      description: A platform user resource
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier
        firstName:
          type: string
          maxLength: 100
          description: User first name
        lastName:
          type: string
          maxLength: 100
          description: User last name
        email:
          type: string
          format: email
          maxLength: 254
          description: User email address (unique per tenant)
        role:
          type: string
          enum: [admin, user]
          description: User role determining permissions
        tenantId:
          type: string
          format: uuid
          description: Organization/tenant the user belongs to
        image:
          type: string
          format: uri
          nullable: true
          description: Optional avatar image URL
        createdAt:
          type: string
          format: date-time
          description: User creation timestamp (ISO 8601, UTC)
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp (ISO 8601, UTC)
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp (null if active)
      required:
        - id
        - firstName
        - lastName
        - email
        - role
        - tenantId
        - createdAt
        - updatedAt
        - deletedAt

    CreateUserRequest:
      type: object
      description: Request payload for creating a new user
      properties:
        firstName:
          type: string
          maxLength: 100
          description: User first name
        lastName:
          type: string
          maxLength: 100
          description: User last name
        email:
          type: string
          format: email
          maxLength: 254
          description: User email address (must be unique within tenant)
        role:
          type: string
          enum: [admin, user]
          description: User role
        image:
          type: string
          format: uri
          nullable: true
          description: Optional avatar image URL
      required:
        - firstName
        - lastName
        - email
        - role

    UpdateUserRequest:
      type: object
      description: Request payload for updating a user (partial; only updatable fields)
      properties:
        firstName:
          type: string
          maxLength: 100
          description: User first name (updatable)
        lastName:
          type: string
          maxLength: 100
          description: User last name (updatable)
        role:
          type: string
          enum: [admin, user]
          description: User role (updatable)
        image:
          type: string
          format: uri
          nullable: true
          description: Optional avatar image URL (updatable)
      minProperties: 1

    Error:
      type: object
      description: Standard error response
      properties:
        error:
          type: string
          description: Error code (e.g., VALIDATION_ERROR, CONFLICT, UNAUTHORIZED)
        message:
          type: string
          description: Human-readable error message
        status:
          type: integer
          description: HTTP status code
      required:
        - error
        - message
        - status

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token required for all operations
