version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: embolsadora_db
    environment:
      POSTGRES_USER: embolsadora_user
      POSTGRES_PASSWORD: embolsadora_password
      POSTGRES_DB: embolsadora_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embolsadora_user -d embolsadora_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - embolsadora_network

  redis:
    image: redis:7-alpine
    container_name: embolsadora_redis
    command: redis-server --requirepass embolsadora_redis_pass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "embolsadora_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - embolsadora_network

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: embolsadora_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      PORT: 8080
      DATABASE_URL: postgres://embolsadora_user:embolsadora_password@db:5432/embolsadora_dev?sslmode=disable
      REDIS_URL: redis://:embolsadora_redis_pass@redis:6379/0
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      INVITATION_RATE_LIMIT_PER_HOUR: ${INVITATION_RATE_LIMIT_PER_HOUR:-20}
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - embolsadora_network
    # Removed the volume that mounted the current directory
    # If you need hot reload for development, we can add a specific volume later

networks:
  embolsadora_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: